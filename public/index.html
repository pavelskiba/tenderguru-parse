<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Поиск тендеров — TenderGuru</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="page-header">
    <h1>Поиск тендеров</h1>
    <p class="subtitle">Данные предоставляются сервисом TenderGuru</p>
  </header>

  <main class="layout">
    <form id="filters-form" class="filters">
      <fieldset>
        <legend>Ключевые слова</legend>
        <input type="text" id="kwords" name="kwords" placeholder="Например: капитальный ремонт кровли" />

        <label class="field-label" for="kwordsWhere">Область поиска</label>
        <select id="kwordsWhere" name="kwordsWhere">
          <option value="">Везде</option>
          <option value="title">В заголовке</option>
          <option value="docs">В документации</option>
          <option value="product">В продукции</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>Код ОКПД2</legend>
        <input type="text" id="okpd" name="okpd" placeholder="Например: 41.20" />
      </fieldset>

      <fieldset>
        <legend>Закон</legend>
        <div class="checkbox-row">
          <label><input type="checkbox" name="laws" value="44fz" /> 44-ФЗ</label>
          <label><input type="checkbox" name="laws" value="223fz" /> 223-ФЗ</label>
          <label><input type="checkbox" name="laws" value="commercial" /> Коммерческие</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Тип заказчика</legend>
        <div class="checkbox-row">
          <label><input type="radio" name="customerType" value="" checked /> Любой</label>
          <label><input type="radio" name="customerType" value="state" /> Государственный</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Электронная площадка</legend>
        <input type="text" class="filter-box" id="etp-filter" placeholder="Фильтр по списку площадок…" />
        <select id="etp" name="etp" size="6">
          <option value="">Любая</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>Цена контракта, руб.</legend>
        <div class="range-row">
          <input type="number" id="priceFrom" name="priceFrom" min="0" placeholder="от" />
          <input type="number" id="priceTo" name="priceTo" min="0" placeholder="до" />
        </div>
      </fieldset>

      <fieldset>
        <legend>Дата размещения</legend>
        <div class="range-row">
          <input type="date" id="dateFrom" name="dateFrom" />
          <input type="date" id="dateTo" name="dateTo" />
        </div>
      </fieldset>

      <fieldset>
        <legend>Регион</legend>
        <input type="text" class="filter-box" id="region-filter" placeholder="Фильтр по списку регионов…" />
        <div class="checkbox-list" id="region-list"></div>
      </fieldset>

      <fieldset>
        <legend>Раздел</legend>
        <div class="checkbox-list" id="section-list"></div>
      </fieldset>

      <fieldset>
        <legend>Расписание автоматической проверки</legend>

        <label class="field-label">Время ежедневной отправки</label>
        <div class="time-wheel" id="time-wheel">
          <div class="time-wheel-highlight"></div>
          <div class="time-wheel-col" id="wheel-hours" aria-label="Часы"></div>
          <div class="time-wheel-sep">:</div>
          <div class="time-wheel-col" id="wheel-minutes" aria-label="Минуты"></div>
        </div>

        <label class="field-label" for="cron-preset">Другие варианты (не время каждый день)</label>
        <select id="cron-preset">
          <option value="">Выбрать из списка…</option>
          <option value="0 */6 * * *">Каждые 6 часов</option>
          <option value="0 * * * *">Каждый час</option>
          <option value="0 9 * * 1-5">Каждый будний день в 09:00</option>
        </select>

        <label class="field-label" for="cron-expr">Cron-выражение</label>
        <input type="text" id="cron-expr" name="cronExpr" placeholder="0 11 * * *" />

        <label class="checkbox-row" style="margin-top: 4px">
          <input type="checkbox" id="schedule-enabled" name="scheduleEnabled" />
          Включить автоматический запуск по расписанию
        </label>
      </fieldset>

      <fieldset>
        <legend>Куда отправлять новые тендеры</legend>
        <div class="checkbox-row">
          <label><input type="checkbox" id="delivery-email" name="delivery" value="email" /> Email</label>
          <label><input type="checkbox" id="delivery-telegram" name="delivery" value="telegram" /> Telegram</label>
          <label><input type="checkbox" id="delivery-sheets" name="delivery" value="sheets" /> Google Sheets</label>
        </div>
      </fieldset>

      <div class="form-actions">
        <button type="submit" id="submit-btn">Сохранить настройки</button>
        <button type="button" id="preview-btn">Предпросмотр результатов</button>
        <button type="button" id="run-now-btn">Проверить сейчас и отправить</button>
      </div>
    </form>

    <section class="results">
      <div id="status-bar" class="status-bar"></div>
      <div id="results-table-wrap"></div>
      <div id="pagination" class="pagination"></div>

      <h2 class="section-title">Журнал автоматических проверок</h2>
      <div id="scheduler-log"></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
